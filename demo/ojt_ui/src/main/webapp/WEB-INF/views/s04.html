<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>S04 · 자산 분류 탐색 — DK엠텍 AAS</title>
    <link rel="stylesheet" th:href="@{/resources/css/fonts.css}" />
    <link rel="stylesheet" th:href="@{/resources/css/app.css}" />
</head>
<body>

<div class="app">
    <nav th:replace="~{fragments/layout :: sidebar(active='s04')}"></nav>

    <div class="main">
        <div class="topbar">
            <div class="topbar-left">
                <div class="crumb">자산관리</div>
                <h1>자산 분류 탐색</h1>
            </div>
        </div>

        <div class="split">
            <aside class="split-pane">
                <div class="split-pane-head"><span class="title">Facility &gt; Equipment &gt; 개별 자산</span></div>
                <div class="split-pane-body">
                    <th:block th:each="n : ${tree}">
                        <div th:replace="~{fragments/asset-tree :: treeNode(${n}, ${selectedKey}, ${icons})}"></div>
                    </th:block>
                </div>
            </aside>

            <section class="split-detail" th:if="${detail != null}">
                <div class="combo-bar" style="margin-bottom:20px;">
                    <div class="combo-title">
                        <span class="path" th:text="${detail.path}">Equipment › 용접설비 › 이동형 용접기 #3</span>
                        <span class="badge" th:classappend="${detail.statusClass}" th:text="'● ' + ${detail.statusLabel}">● 가동 중</span>
                    </div>
                    <a href="s07.html" class="btn primary" style="text-decoration:none; display:inline-flex; align-items:center;">상세조회 열기</a>
                </div>

                <div class="info-grid" style="grid-template-columns:repeat(4,1fr);">
                    <div class="info-card" th:each="card : ${detail.infoCards}">
                        <div class="k" th:text="${card.label}">항목</div>
                        <div class="v" th:classappend="${card.numeric} ? 'num' : ''" th:text="${card.value}">값</div>
                    </div>
                </div>

                <div class="step-hint" style="margin-top:16px; font-size:12.5px;">
                    트리 노드를 클릭하면 이 영역에 미리보기가 표시됩니다. 더블클릭 또는 우측 상단 버튼으로 상세조회(S07)로 이동합니다.
                </div>

                <div class="empty-panel" style="margin-top:36px;">
                    <svg class="icon-svg" width="26" height="26" viewBox="0 0 24 24"><path d="M4 5h16v3H4zM4 10h10v3H4zM4 15h13v3H4z"/></svg>
                    <h3>관련 문서 미리보기</h3>
                    <p th:text="'이 설비에 연결된 문서 ' + ${detail.docCount} + '건이 있습니다. 전체 목록은 상세조회의 &quot;관련 문서&quot; 탭에서 확인할 수 있습니다.'">이 설비에 연결된 문서 3건이 있습니다.</p>
                </div>
            </section>

            <section class="split-detail" th:if="${detail == null}">
                <div class="field-note">
                    <svg class="ico icon-svg" width="13" height="13" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9.5"/><path d="M12 11v6M12 7.5h.01"/></svg>
                    <span>선택한 항목에는 아직 미리보기 데이터가 없습니다. 좌측 트리에서 다른 자산을 선택해 보세요.</span>
                </div>
            </section>
        </div>
    </div>
</div>

<button class="theme-toggle" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')">테마 전환</button>
</body>
</html>
